<!DOCTYPE html>
<html>
<head>
    <title>List Test</title>
    <style type="text/css">
    ul{
    background-color:purple;
    border:1px solid #000000;
    width:95%;
    margin: auto;
    list-style-type: none; /*This line will remove the regular black
bullets and replace them with whatever color/shape you want*/
        }
    /*This block will render GOLD bullets on a purple background - we
set that with the background-color: in the block above. The \2022 is the
unicode for a bullet point. Please notice the negative value on the
margin-left*/
    
    ul li:before{
    content:"\2022";
    color: gold;
    font-weight: bold;
    display: inline-block;
    width: 1em;
    margin-left: -1em;
        }
    li{
    background-color: #cccccc;
    border:1px solid #ffff00;
        }
    h1{
    text-align: center;
    width: 50%;
    color: white;
    background-color: black;
    margin: auto;
    margin-bottom: 20px;
    border-radius: 5px;
    
        }
    </style>
    </head>

<body>
    <h1>List Test</h1>
    <ul>
    <li>Item #1</li>
    <li>Item #2</li>
    <li>Item #3</li>
    </ul>
    </body>
</html>
